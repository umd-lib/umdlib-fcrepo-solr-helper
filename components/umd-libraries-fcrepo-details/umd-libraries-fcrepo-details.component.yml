$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: UMD Lib Digital Details
label: Digital Details
group: UMD Libraries Search

props:
  type: object
  properties:
    key:
      type: string
      title: Classes
      description: "CSS Classes to add to the component"
    metadata_heading:
      type: string
      title: Metadata Heading
      description: "Metadata Heading"
    collections_heading:
      type: string
      title: Collections Heading
      description: "Collections Heading"
    actions_heading:
      type: string
      title: Actions Heading
      description: "Actions Heading"
    show_actions:
      type: boolean
      title: Show Actions
      description: Check to show the actions subsection
    show_aeon:
      type: boolean
      title: Show Aeon Button
    iiif_base:
      type: string
      title: IIIF Base URL
    restricted_iiif_base:
      type: string
      title: Restricted IIIF Base URL
    iiif_prefix:
      type: string
      title: IIIF Prefix
    error_message:
      type: string
      title: IIIF Error message
    title_label:
      type: string
      title: Title Label
    description_label:
      type: string
      title: Description Label
    extent_label:
      type: string
      title: Extent Label
    date_label:
      type: string
      title: Date Label
    creator_label:
      type: string
      title: Creator Label
    contributor_label:
      type: string
      title: Contributor Label
    location_label:
      type: string
      title: Location Label
    publisher_label:
      type: string
      title: Publisher Label
    subject_label:
      type: string
      title: Subject Label
    citation_label:
      type: string
      title: Citation Label
    resource_type_label:
      type: string
      title: Resource Type Label
    recipient_label:
      type: string
      title: Recipient Label
    terms_label:
      type: string
      title: Terms Label
    language_label:
      type: string
      title: Language Label
    scpa_collection:
      type: string
      title: SCPA Collection
    field_1_label:
      type: string
      title: Undefined field label 1
    field_2_label:
      type: string
      title: Undefined field label 2
    field_3_label:
      type: string
      title: Undefined field label 3
    field_4_label:
      type: string
      title: Undefined field label 4
    field_5_label:
      type: string
      title: Undefined field label 5
    iiif_restricted_viewer_value:
      type: string
      title: Restricted Viewer Value
      description: If restricted viewer field is set, add a value to look for here.

slots:
  breadcrumb:
    title: Breadcrumb
    description: Breadcrumb block slot.
  handle:
    title: Handle
    description: Object handle.
  page_heading:
    title: Page Heading
    description: Page heading, such as object title.
  title:
    title: Title
    description: Object title.
  description:
    title: Description
    description: Object description.
  extent:
    title: Extent
    description: Object extent.
  date:
    title: Date
    description: Object date.
  creator:
    title: Creator
    description: Object creator(s).
  contributor:
    title: Contributor
    description: Object contributor(s).
  location:
    title: Location
    description: Object location.
  publisher:
    title: Publisher
    description: Object publisher.
  subject:
    title: Subject
    description: Object subject.
  citation:
    title: Citation
    description: Object citation.
  resource_type:
    title: Resourse Type
    description: Object resource type
  recipient:
    title: Recipient
    description: Object recipient
  collection:
    title: Collection(s)
    description: Object collection(s) with links
  aeon_collection:
    title: Aeon Collection
    description: Collection string for Aeon link
  terms:
    title: Terms of use
    description: Object terms
  iiif_id:
    title: IIIF ID
    description: IIIF ID used for Mirador
  downloadable:
    title: Download URI
    description: Record URI for file download
  call_number:
    title: Identifier / Call number
    description: Record URI for file download
  language:
    title: Content language
    description: The language of the record
  field_1:
    title: Undefined Field 1
    description: For additional data not included in other fields.
  field_2:
    title: Undefined Field 2
    description: For additional data not included in other fields.
  field_3:
    title: Undefined Field 3
    description: For additional data not included in other fields.
  field_4:
    title: Undefined Field 4
    description: For additional data not included in other fields.
  field_5:
    title: Undefined Field 5
    description: For additional data not included in other fields.
  iiif_restricted_viewer_field:
    title: Restricted Viewer Field
    description: Check this field for restricted viewer. Set the restricted viewer value property as well.

libraryOverrides:
  dependencies:
  - core/drupal
  - core/once
  - core/jquery
  js:
    js/clipboard.min.js: {}
    umd-libraries-fcrepo-details.js: {}
