  language:
    title: Content language
    description: The language of the record
  call_number:
    title: Field One (Call Number)
    description: Intended for Call Number
  citation:
    title: Field Two (Citation)
    description: Intended for Citation
  contributor:
    title: Field Three (Contributor)
    description: Intended for Contributor(s)
  creator:
    title: Field Four (Creator)
    description: Intended for Creator(s)
  date:
    title: Field Five (Date)
    description: Intended for Date
  description:
    title: Field Six (Description)
    description: Intended for Description
  extent:
    title: Field Seven (Extent)
    description: Intended for Extent
  location:
    title: Field Eight (Location)
    description: Intended for Location
