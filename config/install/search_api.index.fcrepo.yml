langcode: en
status: true
dependencies:
  config:
  - search_api.server.solrizer
  module:
  - search_api_solr
third_party_settings:
  search_api_solr:
    finalize: false
    commit_before_finalize: false
    commit_after_finalize: false
    debug_finalize: false
    highlighter:
      maxAnalyzedChars: 51200
      fragmenter: gap
      usePhraseHighlighter: true
      highlightMultiTerm: true
      preserveMulti: false
      regex:
        slop: 0.5
        pattern: blank
        maxAnalyzedChars: 10000
      highlight:
        mergeContiguous: false
        requireFieldMatch: false
        snippets: 3
        fragsize: 0
    mlt:
      mintf: 1
      mindf: 1
      maxdf: 0
      maxdfpct: 0
      minwl: 0
      maxwl: 0
      maxqt: 100
      maxntp: 2000
      boost: false
      interestingTerms: none
    term_modifiers:
      slop: 3
      fuzzy: 1
      fuzzy_analyzer: true
    advanced:
      index_prefix: ''
      collection: ''
      timezone: ''
    multilingual:
      limit_to_content_language: false
      include_language_independent: true
      use_language_undefined_as_fallback_language: false
      specific_languages:
        en: '0'
      use_universal_collation: false
id: fcrepo
name: fcrepo
description: ''
read_only: true
field_settings:
  archival_collection__facet:
    label: 'Archival collection  facet'
    datasource_id: solr_document
    property_path: archival_collection__facet
    type: string
  id:
    label: Id
    datasource_id: solr_document
    property_path: id
    type: string
  is_discoverable:
    label: 'Is discoverable'
    datasource_id: solr_document
    property_path: is_discoverable
    type: boolean
  is_published:
    label: 'Is published'
    datasource_id: solr_document
    property_path: is_published
    type: boolean
  item__title__txt:
    label: 'Item  title  txt'
    datasource_id: solr_document
    property_path: item__title__txt
    type: text
  object__rights__label__txt:
    label: 'Object  rights  label  txt'
    datasource_id: solr_document
    property_path: object__rights__label__txt
    type: text
  page__title__display:
    label: 'Page  title  display'
    datasource_id: solr_document
    property_path: page__title__display
    type: string
  page__title__txt:
    label: 'Page  title  txt'
    datasource_id: solr_document
    property_path: page__title__txt
    type: text
  text:
    label: Text
    datasource_id: solr_document
    property_path: text
    type: text
datasource_settings:
  solr_document:
    id_field: id
    request_handler: ''
    default_query: '*:*'
    label_field: ''
    language_field: ''
    url_field: ''
processor_settings:
  add_url: {}
  aggregated_field: {}
  auto_aggregated_fulltext_field: {}
  custom_value: {}
  entity_type: {}
  language_with_fallback: {}
  rendered_item: {}
  solr_date_range: {}
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 0
  delete_on_fail: true
  index_directly: false
  track_changes_in_references: false
server: solrizer
